<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SSF Chathamangalam Sector Sahitholsav</title>
    <link rel="icon" href="images/theme sahi cgm.png" type="image/png">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.cdnfonts.com/css/cooper-black" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/session.js"></script>
    <script src="js/auth.js"></script>
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <img src="images/logo.png" alt="SSF Logo" class="logo">
                <h2 class="ssf-font">Admin Portal</h2>
                <p>Sign in to manage <span class="ssf-font" style="font-size: 1.1em; color: var(--primary);">SSF</span> Chathamangalam Sector Sahitholsav</p>
                <div id="timeout-msg" style="color: var(--danger); font-size: 0.85rem; margin-top: 10px; display: none;">Session expired due to inactivity. Please log in again.</div>
            </div>

            <form id="loginForm" onsubmit="return false;">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 0.85rem; color: var(--text-muted); cursor: pointer;">👁️ Show</button>
                    </div>
                </div>

                <div id="brute-force-msg" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 10px; text-align: center; display: none;">
                    Too many attempts. Please wait.
                </div>

                <button type="submit" id="loginBtn" class="btn-primary">
                    Sign In
                </button>
            </form>
            <div class="auth-footer" style="text-align:center; margin-top: 2rem; opacity: 0.6; font-size: 0.8rem;">
                <p><span class="ssf-font">SSF</span> Chathamangalam Sector Sahitholsav</p>
                <p>ssfchathamangalam@gmail.com</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            // Check reason
            const params = new URLSearchParams(window.location.search);
            if (params.get('reason') === 'timeout' || params.get('timeout') === '1') {
                const msg = document.getElementById('timeout-msg');
                msg.style.display = 'block';
                msg.textContent = 'Session expired due to inactivity. Please log in again.';
            }

            // Check if already logged in
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                window.location.replace('dashboard.html');
                return;
            }

            // Password Toggle
            document.getElementById("togglePassword").addEventListener("click", function() {
                const passInput = document.getElementById("password");
                if (passInput.type === "password") {
                    passInput.type = "text";
                    this.textContent = "🙈 Hide";
                } else {
                    passInput.type = "password";
                    this.textContent = "👁️ Show";
                }
            });

            // Login Logic
            document.getElementById("loginForm").addEventListener("submit", async (e) => {
                e.preventDefault();
                
                const email = document.getElementById("email").value;
                const password = document.getElementById("password").value;
                const loginBtn = document.getElementById("loginBtn");

                loginBtn.disabled = true;
                loginBtn.innerHTML = '<div class="loader-spinner" style="width:20px;height:20px;border-width:2px;margin:0;border-top-color:#fff;"></div><span>Checking...</span>';

                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) {
                    console.error(error);
                    let errMsg = 'Invalid login credentials.';
                    if (error.message.toLowerCase().includes('rate limit')) errMsg = 'Too many attempts. Please wait.';
                    
                    const msg = document.getElementById('timeout-msg');
                    msg.style.display = 'block';
                    msg.textContent = errMsg;
                    msg.style.color = 'var(--danger)';

                    loginBtn.disabled = false;
                    loginBtn.textContent = "Sign In";
                } else if (data.user) {
                    if (typeof logActivity === 'function') await logActivity('login', 'auth');
                    window.location.replace("dashboard.html");
                }
            });
        });
    </script>
</body>
</html>
